{% extends 'base.html' %}
{% block content %}
<div>
	<h1> Login</h1>
	<h5> please fill in your credentials to login</h5>
	<form method="post" action="/login">
		<label>Email: </label><br>
		<input type="email" name="email" placeholder="Enter the email here..." required> <br><br>
		<label> Password: </label><br>
		<input type="password" name="password" placeholder="Enter the password here..." required> <br><br>
		<button type="submit"> login </button>
	</form>
	<h4>Don't have an account <a href="/register">Register here</a></h4>
</div>
{% endblock %}
